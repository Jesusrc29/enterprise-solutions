services:
  oracle-xe:
    image: gvenzl/oracle-xe:21-slim-faststart
    container_name: oracle-xe
    environment:
      ORACLE_PASSWORD: ${ORACLE_PASSWORD:-oracle}
      APP_USER: ${APP_USER:-employee_app}
      APP_USER_PASSWORD: ${APP_USER_PASSWORD:-employee_app}
    ports:
      - "${DB_PORT:-1521}:1521"
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 40s
    volumes:
      - oracle-xe-data:/opt/oracle/oradata

  employee-management-api:
    build:
      context: .
      dockerfile: services/employee-management-api/Dockerfile
    container_name: employee-management-api
    depends_on:
      oracle-xe:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      SERVER_PORT: ${APP_PORT:-8080}
      DB_HOST: oracle-xe
      DB_PORT: 1521
      DB_SERVICE: ${DB_SERVICE:-XEPDB1}
      DB_USERNAME: ${APP_USER:-employee_app}
      DB_PASSWORD: ${APP_USER_PASSWORD:-employee_app}
      JWT_SECRET: ${JWT_SECRET:-change-this-jwt-secret-with-at-least-32-characters}
      JWT_EXPIRATION_SECONDS: ${JWT_EXPIRATION_SECONDS:-3600}
      JAVA_OPTS: -Xms256m -Xmx512m
    ports:
      - "${APP_PORT:-8080}:8080"

volumes:
  oracle-xe-data:
